<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F472B6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- 背景（アプリアイコンらしい角丸） -->
  <rect width="512" height="512" rx="110" fill="url(#bg-gradient)" />
  
  <!-- カードのシルエット -->
  <rect x="116" y="86" width="280" height="380" rx="30" fill="white" filter="url(#shadow)" />
  
  <!-- パステルのドット模様 -->
  <circle cx="180" cy="160" r="15" fill="#FBCFE8" />
  <circle cx="330" cy="160" r="15" fill="#DDD6FE" />
  <circle cx="180" cy="380" r="15" fill="#DDD6FE" />
  <circle cx="330" cy="380" r="15" fill="#FBCFE8" />
  
  <!-- 中央の肉球マーク -->
  <g transform="translate(256, 280) scale(1.1)">
    <path d="M0 -55 C-25 -80, -60 -80, -70 -45 C-80 -10, -45 15, 0 35 C45 15, 80 -10, 70 -45 C60 -80, 25 -80, 0 -55 Z" fill="#F472B6" />
    <ellipse cx="-85" cy="-25" rx="28" ry="38" transform="rotate(-25)" fill="#F472B6" />
    <ellipse cx="85" cy="-25" rx="28" ry="38" transform="rotate(25)" fill="#F472B6" />
    <ellipse cx="-70" cy="55" rx="28" ry="34" transform="rotate(-10)" fill="#F472B6" />
    <ellipse cx="70" cy="55" rx="28" ry="34" transform="rotate(10)" fill="#F472B6" />
  </g>
  
  <!-- キラキラ装飾 -->
  <g fill="#FDE047">
    <path d="M420 60 L435 100 L475 115 L435 130 L420 170 L405 130 L365 115 L405 100 Z" />
    <path d="M90 380 L100 405 L125 415 L100 425 L90 450 L80 425 L55 415 L80 405 Z" opacity="0.8" />
    <circle cx="256" cy="140" r="12" />
  </g>
</svg>