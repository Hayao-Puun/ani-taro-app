<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- ピンク〜紫〜青のグラデーション -->
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F472B6" /> <!-- pink-400 -->
      <stop offset="50%" stop-color="#C084FC" /> <!-- purple-400 -->
      <stop offset="100%" stop-color="#818CF8" /> <!-- indigo-400 -->
    </linearGradient>
    
    <!-- 背景のドットパターン -->
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="3" fill="white" fill-opacity="0.2" />
    </pattern>
    
    <!-- 影の効果 -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- カードの背景（角丸） -->
  <rect x="20" y="20" width="472" height="472" rx="60" fill="url(#cardGradient)" />
  
  <!-- ドットの重ねがけ -->
  <rect x="20" y="20" width="472" height="472" rx="60" fill="url(#dots)" />

  <!-- 内側の破線枠 -->
  <rect x="50" y="50" width="412" height="412" rx="40" fill="none" stroke="white" stroke-width="10" stroke-dasharray="25 15" stroke-opacity="0.6" />

  <!-- 中央のコンテンツ -->
  <g transform="translate(256, 230)">
    <!-- 王冠アイコン (Lucide Crown風) -->
    <g transform="translate(-60, -110) scale(5)" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#dropShadow)">
      <path d="M2 4l3 12h14l3-12-6 7-4-7-4 7-6-7z" />
      <path d="M5 20h14" />
    </g>
    
    <!-- キラキラ装飾 -->
    <g transform="translate(40, -120) scale(2)" fill="#FDE047" filter="url(#dropShadow)">
       <path d="M10 0 L12 7 L19 9 L12 11 L10 18 L8 11 L1 9 L8 7 Z" />
    </g>

    <!-- テキスト -->
    <text x="0" y="60" font-family="Arial, sans-serif" font-weight="900" font-size="70" fill="white" text-anchor="middle" filter="url(#dropShadow)" letter-spacing="4">ANI</text>
    <text x="0" y="140" font-family="Arial, sans-serif" font-weight="900" font-size="70" fill="white" text-anchor="middle" filter="url(#dropShadow)" letter-spacing="4">TARO</text>
  </g>
</svg>